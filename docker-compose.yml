services:
  backend:
    build: .
    ports:
      - "0.0.0.0:8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  uptime-monitor:
    build: ./uptime_monitor
    env_file:
      - .env
    environment:
      - MONITOR_TARGET_URL=http://backend:8000/api/v1/health
      - MONITOR_SERVICE_NAME=TED Bot Backend
      - MONITOR_CHECK_INTERVAL=60
      - MONITOR_REQUEST_TIMEOUT=10
      - MONITOR_FAILURES_BEFORE_ALERT=2
    depends_on:
      - backend
    restart: unless-stopped


